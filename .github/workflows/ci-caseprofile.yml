name: CI - CaseProfile (Go)

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'CaseProfile/**'
      - '.github/workflows/ci-caseprofile.yml'
  pull_request:
    branches: [main, develop, 'feature/**']
    paths:
      - 'CaseProfile/**'
      - '.github/workflows/ci-caseprofile.yml'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: CaseProfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CaseProfile/go.mod
          cache-dependency-path: CaseProfile/go.sum

      - name: Configure git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./CaseProfile
          push: false
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          tags: case-profile:${{ github.sha }}
