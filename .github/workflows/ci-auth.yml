name: CI - Auth (Python)

on:
  push:
    branches: [main, develop]
    paths:
      - 'Auth/**'
      - '.github/workflows/ci-auth.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Auth/**'
      - '.github/workflows/ci-auth.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Auth

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Auth/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: Auth

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      REDIS_DB: 0
      CORS_ORIGINS: http://localhost
      JWT_ALG: RS256
      GOOGLE_CLIENT_ID: test-google-client-id

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Auth/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Generate RSA keys
        run: cd keys && python generate_rsa_keys.py

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest src/ -v
