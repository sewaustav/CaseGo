name: CI - CaseGo (Go)

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'CaseGo/**'
      - '.github/workflows/ci-casego.yml'
  pull_request:
    branches: [main, develop, 'feature/**']
    paths:
      - 'CaseGo/**'
      - '.github/workflows/ci-casego.yml'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: CaseGo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: CaseGo/go.mod
          cache-dependency-path: CaseGo/go.sum

      - name: Configure git for private modules
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./CaseGo
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/casego-casego:latest
          build-args: GITHUB_TOKEN=${{ secrets.GH_PAT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy CaseGo
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/casego/backend
            git pull
            echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull case-go
            docker compose up -d --no-deps case-go
