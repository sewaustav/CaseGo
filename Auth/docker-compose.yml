services:
  alembic:
    build: .
    container_name: auth_alembic
    command: alembic upgrade head
    env_file:
      - .env
    volumes:
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth_net
    restart: on-failure

  fastapi:
    build: .
    container_name: auth_fastapi
    ports:
      - "${API_PORT_FORWARD:-8000}:${API_PORT:-8000}"
    env_file:
        - .env
    volumes:
      - ./src:/app/src
      - ./keys:/app/keys:ro
    depends_on:
      - postgres
      - redis
      - alembic
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=2)" ]
      timeout: 5s
      start_period: 15s
      retries: 10
    networks:
      - auth_net

  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT_FORWARD}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - auth_net

  redis:
    image: redis:8.2.1-alpine
    container_name: auth_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT_FORWARD}:6379"
    env_file:
        - .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping" ]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 5s
    networks:
      - auth_net

volumes:
  postgres_data:
  redis_data:

networks:
  auth_net:
    driver: bridge