services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    hostname: postgres
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  migrate:
    image: migrate/migrate
    container_name: migrate-service
    volumes:
      - ./Profile/migrations:/migrations
    command: -path=/migrations/ -database "postgres://dev_user:dev_password@postgres:5432/app_db?sslmode=disable" up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  app:
    build:
      context: ./Profile
      args:
        SERVICE_NAME: caseGo
    container_name: app-service
    env_file: Profile/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - app-network

  auth-fastapi:
    build: 
      context: ./Auth
    container_name: auth_fastapi
    ports:
      - "${API_PORT_FORWARD:-8000}:${API_PORT:-8000}"
    env_file:
      - Auth/.env
    volumes:
      - ./Auth/src:/app/src
      - ./Auth/keys:/app/keys:ro
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=2)" ]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 10
    networks:
      - app-network

  auth-postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    restart: unless-stopped
    env_file:
        - Auth/.env
    ports:
      - "5444:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  auth-redis:
    image: redis:8.2.1-alpine
    container_name: auth_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_FORWARD}:6379"
    env_file:
      - Auth/.env
    volumes:
      - auth_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping" ]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  casego-postgres:
    image: postgres:15-alpine
    container_name: casego_postgres
    restart: unless-stopped
    env_file:
      - CaseGo/.env
    ports:
      - "5433:5432"
    volumes:
      - casego_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  casego-migrate:
    image: migrate/migrate
    container_name: casego_migrate
    volumes:
      - ./CaseGo/migrations:/migrations
    command: -path=/migrations/ -database "postgres://casego_user:casego_password@casego-postgres:5432/casego_db?sslmode=disable" up
    env_file:
      - CaseGo/.env
    depends_on:
      casego-postgres:
        condition: service_healthy
    networks:
      - app-network

  casego-redis:
    image: redis:8-alpine
    container_name: casego_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    ports:
      - "6380:6379"
    env_file:
      - CaseGo/.env
    volumes:
      - casego_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  case-go:
    build:
      context: ./CaseGo
      secrets:
        - github_token
    container_name: case_go
    env_file:
      - CaseGo/.env
    environment:
      POSTGRES_HOST: casego-postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: casego-redis
      REDIS_PORT: 6379
    ports:
      - "8081:8080"
    depends_on:
      casego-postgres:
        condition: service_healthy
      casego-migrate:
        condition: service_completed_successfully
      casego-redis:
        condition: service_healthy
    networks:
      - app-network

  caseprofile-postgres:
    image: postgres:15-alpine
    container_name: caseprofile_postgres
    restart: unless-stopped
    env_file:
      - CaseProfile/.env
    ports:
      - "5434:5432"
    volumes:
      - caseprofile_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  caseprofile-migrate:
    image: migrate/migrate
    container_name: caseprofile_migrate
    volumes:
      - ./CaseProfile/migrations:/migrations
    command: -path=/migrations/ -database "postgres://caseprofile_user:caseprofile_password@caseprofile-postgres:5432/caseprofile_db?sslmode=disable" up
    depends_on:
      caseprofile-postgres:
        condition: service_healthy
    networks:
      - app-network

  case-profile:
    build:
      context: ./CaseProfile
      secrets:
        - github_token
    container_name: case_profile
    env_file:
      - CaseProfile/.env
    environment:
      POSTGRES_HOST: caseprofile-postgres
      POSTGRES_PORT: 5432
    ports:
      - "8082:8080"
      - "50051:50051"
    depends_on:
      caseprofile-postgres:
        condition: service_healthy
      caseprofile-migrate:
        condition: service_completed_successfully
    networks:
      - app-network

volumes:
  auth_postgres_data:
  auth_redis_data:
  casego_postgres_data:
  casego_redis_data:
  caseprofile_postgres_data:

secrets:
  github_token:
    environment: GITHUB_TOKEN

networks:
  app-network:
    driver: bridge