services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    hostname: postgres
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  migrate:
    image: migrate/migrate
    container_name: migrate-service
    volumes:
      - ./Profile/migrations:/migrations
    command: -path=/migrations/ -database "postgres://dev_user:dev_password@postgres:5432/app_db?sslmode=disable" up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  app:
    build:
      context: ./Profile
      args:
        SERVICE_NAME: caseGo
    container_name: app-service
    env_file: Profile/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - app-network

  auth-fastapi:
    build: 
      context: ./Auth
    container_name: auth_fastapi
    ports:
      - "${API_PORT_FORWARD:-8000}:${API_PORT:-8000}"
    env_file:
      - Auth/.env
    volumes:
      - ./Auth/src:/app/src
      - ./Auth/keys:/app/keys:ro
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=2)" ]
      timeout: 5s
      start_period: 15s
      retries: 10
    networks:
      - app-network

  auth-postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    restart: unless-stopped
    env_file:
        - Auth/.env
    ports:
      - "5444:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  auth-redis:
    image: redis:8.2.1-alpine
    container_name: auth_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_FORWARD}:6379"
    env_file:
      - Auth/.env
    volumes:
      - auth_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 5s
    networks:
      - app-network

volumes:
  auth_postgres_data:
  auth_redis_data:

networks:
  app-network:
    driver: bridge